name: "Feature request / 功能建议"
description: "为 Windows Dream Skin APP 提出功能或主题建议"
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        项目范围是 Windows Codex 可视化换肤 APP，不包含 API 中转配置，也不修改官方安装包。

  - type: input
    id: summary
    attributes:
      label: 一句话概括
      placeholder: "例如：支持导入和切换主题包"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 使用场景或当前问题
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 重要程度
      options:
        - 有更好
        - 会经常使用
        - 当前工作流被阻塞
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 这是换肤 APP、主题或 UI 体验相关建议
          required: true
        - label: 我没有要求修改官方 Codex 二进制或 `app.asar`
          required: true
